<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bones Forge</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Cinzel&display=swap" rel="stylesheet">
    <link id="favicon" rel="icon" type="image/PNG" href="AnvilOutlineLogo02small.png"/>
</head>
<style>
    body, * {
        cursor: auto !important;
    }
</style>
<body>
    <a href="index.html">
    <img class="portfolio-img" src="AnvilOutlineLogo03small.png" alt="Bones Forge">
    </a>    
    <h1>Contact Form</h1>

    <div class="container">  
  <form action="https://formspree.io/f/xvgqorpw" method="POST">
    <div class="form-group">
      <div class="form-row">
        <div class="col">
          <input type="text" name="name" class="form-control" placeholder="Full Name" required>
        </div>
        <div class="col">
          <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        </div>
      </div>
    </div>
    <div class="form-group">
      <textarea placeholder="Your Message" class="form-control" name="message" rows="10" required></textarea>
    </div>
    <button type="submit" class="btn btn-lg btn-dark btn-block">Submit Form</button>
  </form>
</div>

  <nav>
        <ul>
            <li><a href="index.html">Back to Home</a></li>          
        </ul>
    </nav>
    <footer>
<svg viewBox="0 0 300 50" width="300" height="20">
  <text id="forge-text" x="150" y="35" text-anchor="middle" font-size="32" fill="#ff6600">
    Forged In The Cloud
  </text>
</svg>
</footer>
</body>
</html>
