<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bones Forge Countdown Timer</title>
    <link rel="stylesheet" href="styles.css?v=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Cinzel&display=swap" rel="stylesheet">
<link id="favicon" rel="icon" type="image/PNG" href="AnvilOutlineLogo02small.png"/>
</head>
<body>
    <img src="AnvilOutlineLogo02small.png" alt="Bones Forge">
    <h1>Bones Forge Countdown Timer</h1>
    
    <div>
        <input type="number" id="timeInput" placeholder="Enter minutes" min="1">
        <button class="button2 interactive" onclick="startCustomCountdown()">Start Timer</button>
    </div>
    <div>
        <button class="interactive" onclick="pauseCountdown()">Pause</button>
        <button class="interactive" onclick="resumeCountdown()">Resume</button>
        <button class="interactive" onclick="resetCountdown()">Reset</button>
    </div>
    <div>
        <label for="toggleMinuteSound">Hammertime</label>
        <input type="checkbox" id="toggleMinuteSound" checked>
    </div>
    
    <div id="progressBarContainer">
        <div id="progressBar"></div>
    </div>
    <div id="countdown"></div>
    
    <audio id="alertSound" src="gong.mp3"></audio>
    <audio id="minuteSound" src="hammer-strike.mp3"></audio>

    <nav>
        <ul>
            <li><a class="interactive" href="main.html">Main</a></li>
            <li><a class="interactive" href="main02.html">CV</a></li>
            <li><a class="interactive" href="contact.html">Contact</a></li>
            <li><a class="interactive" href="search.html">Search</a></li>
            <li><a class="interactive" href="Rand.html">Random Sequence Generator</a></li>
            <li><a class="interactive" href="kat.html">Kat</a></li>
            <li><a class="interactive" href="https://www.youtube.com/@Stonywillis">YouTube</a></li>
            <li><a class="interactive" href="https://www.ebay.co.uk/usr/shamen-vo">eBay</a></li>
            <li><a class="interactive" href="https://www.etsy.com/shop/BonesForge?ref=dashboard-header">Etsy Shop</a></li>
            <li><a class="interactive" href="https://www.linkedin.com/in/tony-willis-5a0630356">Linkedin</a></li>
        </ul>
    </nav>
    <footer>
<svg viewBox="0 0 300 50" width="300" height="20">
  <text id="forge-text" x="150" y="35" text-anchor="middle" font-size="32" fill="#ff6600">
    Forged In The Cloud
  </text>
</svg>
</footer>
<div id="snow-container"></div>

    <script src="script.js"></script>
    <script src="snow.js"></script>

</body>
</html>
