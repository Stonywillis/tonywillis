<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bones Forge Countdown Timer</title>
    <link rel="stylesheet" href="styles.css?v=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Cinzel&display=swap" rel="stylesheet">
<link id="favicon" rel="icon" type="image/PNG" href="AnvilOutlineLogo02small.png"/>
</head>
<body>
    <div id="smoke"></div>
    <script>
        document.addEventListener("DOMContentLoaded", () =>{
            let smoke = document.getElementById("smoke");

            function getRandomColor() {
                const colors = ["#B2BEB5", "#7393B3", "#36454F", "#A9A9A9", "#D3D3D3", "#C0C0C0", "#899499"];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            function createsmoke(e) {
                let elem = document.createElement("div");
                elem.classList.add("elem");

                elem.style.left = `${e.clientX}px`;
                elem.style.top = `${e.clientY}px`;
                elem.style.background = `radial-gradient(circle, ${getRandomColor()} 0%, rgba(0, 0, 0, 0) 80%)`;
                
                smoke.appendChild(elem);
                setTimeout(() => {
                    elem.remove();
                }, 1200);
            }
            document.body.addEventListener("mousemove", createsmoke);

        });
    </script>

    <img src="AnvilOutlineLogo03small.png" alt="Bones Forge">
    <h1>Bones Forge Countdown Timer</h1>
    
    <div>
        <input type="number" id="timeInput" placeholder="Enter minutes" min="1">
        <button class="button2 interactive" onclick="startCustomCountdown()">Start Timer</button>
    </div>
    <div>
        <button class="interactive" onclick="pauseCountdown()">Pause</button>
        <button class="interactive" onclick="resumeCountdown()">Resume</button>
        <button class="interactive" onclick="resetCountdown()">Reset</button>
    </div>
    <div>
        <label for="toggleMinuteSound">Hammertime</label>
        <input type="checkbox" id="toggleMinuteSound" checked>
    </div>
    
    <div id="progressBarContainer">
        <div id="progressBar"></div>
    </div>
    <div id="countdown"></div>
    
    <audio id="alertSound" src="gong.mp3"></audio>
    <audio id="minuteSound" src="hammer-strike.mp3"></audio>

<svg viewBox="0 0 300 50" width="300" height="20">
